<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>One Last Surprise 🎁</h1>

<!-- STEP 1: Button -->
<button onclick="showGift()">Tap to Open 🎁</button>

<!-- STEP 2: Hidden Gift -->
<br><br>
<img id="gift" src="images/gift.png" width="200" 
     style="display:none; cursor:pointer;" 
     onclick="openGift()">

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music/music.mp3">
</audio>

<script>
function showGift(){
    document.getElementById("gift").style.display = "block";
}

function openGift(){
    document.getElementById("music").play();

    document.body.innerHTML = `
    <h1>🎉 HAPPY BIRTHDAY SIR 🎉</h1>
    <p> JINGA LALA HUHU </p>
    `;
    
    // start effects
    fireworks();
    confetti();
}
</script>

<script src="script.js"></script>

</body>
</html>
